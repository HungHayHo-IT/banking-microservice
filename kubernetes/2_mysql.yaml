# user-accounts-mysql
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-account-mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-account-mysql
  labels:
    app: user-account-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-account-mysql
  template:
    metadata:
      labels:
        app: user-account-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              value: "users-account-db"
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: user-account-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: user-account-mysql
spec:
  selector:
    app: user-account-mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306

