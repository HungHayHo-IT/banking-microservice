apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-account-service
  labels:
    app: user-account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-account-service
  template:
    metadata:
      labels:
        app: user-account-service
    spec:
      containers:
        - name: user-account-service
          image: hunghayho/bankapp-microservice-user-account-service
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: banking-configmap
                  key: USER_ACCOUNT_SERVICE_APPLICATION_NAME
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: banking-configmap
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-configmap
                  key: USER_ACCOUNT_DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: DB_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: banking-configmap
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: JWT_EXPIRATION
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 35
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user-account-service
spec:
  selector:
    app: user-account-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081